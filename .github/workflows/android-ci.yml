name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:

# Force Node.js 24 to prevent GitHub Actions deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Generate mock local.properties for CI
        run:
            # Generate file with dummy values to satisfy the Manifest Merger
            # The variable name MUST match the one read in build.gradle.kts
            echo "API_TOKEN=DUMMY_MAPS_KEY_FOR_CI" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: unit-test-reports
          path: app/build/reports/tests/testDebugUnitTest/